<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Encuesta</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h1>Encuesta sobre uso de IA en programación</h1>
    </header>

    <nav>
        <a href="index.html">Inicio</a>
        <a href="survey.html">Crear encuesta</a>
        <a href="contact-us.html">Contáctenos</a>
    </nav>

    <main>
        <form>

            <section>
                <p>1. ¿Usas IA para programar?</p>
                <input type="radio" id="op1" name="p1">
                <label for="op1">Sí</label>

                <input type="radio" id="op2" name="p1">
                <label for="op2">No</label>

                <input type="radio" id="op3" name="p1">
                <label for="op3">A veces</label>
            </section>

            <section>
                <p>2. ¿Qué tan útil te parece la IA?</p>
                <input type="radio" id="op4" name="p2">
                <label for="op4">Muy útil</label>

                <input type="radio" id="op5" name="p2">
                <label for="op5">Regular</label>

                <input type="radio" id="op6" name="p2">
                <label for="op6">Nada útil</label>
            </section>

            <section>
                <p>3. ¿Con qué frecuencia usas IA?</p>
                <input type="radio" id="op7" name="p3">
                <label for="op7">Siempre</label>

                <input type="radio" id="op8" name="p3">
                <label for="op8">A veces</label>

                <input type="radio" id="op9" name="p3">
                <label for="op9">Nunca</label>
            </section>

            <section>
                <p>4. ¿Crees que la IA reemplazará a los programadores?</p>
                <input type="radio" id="op10" name="p4">
                <label for="op10">Sí</label>

                <input type="radio" id="op11" name="p4">
                <label for="op11">No</label>

                <input type="radio" id="op12" name="p4">
                <label for="op12">Tal vez</label>
            </section>

            <button type="submit">Enviar</button>

        </form>
    </main>

</body>
</html>
